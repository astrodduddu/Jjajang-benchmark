<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>자장면관 벤치마킹</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #F5F5F5;
    font-family: 'Pretendard', 'Apple SD Gothic Neo', -apple-system, sans-serif;
  }

  /* ===== Layout ===== */
  .main {
    display: flex; height: 100vh; overflow: hidden;
  }
  .graph-section {
    flex: 1; display: flex;
    align-items: center; justify-content: center;
    padding: 20px;
    min-width: 0;
  }
  .sidebar {
    width: 320px; height: 100vh;
    background: #FFF;
    border-left: 1px solid #E8E8E8;
    display: flex; flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
  }

  /* ===== Graph ===== */
  .graph-card {
    width: 100%; max-width: calc(100vh - 40px);
    aspect-ratio: 1;
    position: relative; background: #FFF;
    border-radius: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    padding: 0;
    overflow: visible;
  }
  .graph-inner { width: 100%; height: 100%; position: relative; }


  /* ===== Points ===== */
  .point {
    position: absolute; transform: translate(-50%, -50%);
    z-index: 10; cursor: grab; touch-action: none;
    writing-mode: horizontal-tb;
    text-orientation: mixed;
  }
  .point:hover { z-index: 40; }
  .point.dragging { z-index: 50; cursor: grabbing; }
  .point-dot {
    width: 22px; height: 22px; border-radius: 50%;
    background: #1A1A1A; color: #FFF;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    transition: box-shadow 0.15s, background 0.15s;
    line-height: 1;
  }
  .point.dragging .point-dot {
    background: #E74C3C;
    box-shadow: 0 0 0 4px rgba(231,76,60,0.2);
  }
  .point-intuition {
    position: absolute; top: -12px; right: calc(50% + 4px);
    font-size: 8px; font-weight: 800; color: #E74C3C;
    pointer-events: none; line-height: 1;
  }
  .point-aroma {
    position: absolute; top: -12px; left: calc(50% + 4px);
    font-size: 8px; font-weight: 700; color: #2196F3;
    pointer-events: none; line-height: 1;
  }
  .point-name {
    position: absolute; top: 24px; left: 50%;
    transform: translateX(-50%);
    font-size: 8px; font-weight: 600; color: #333;
    white-space: nowrap;
    background: rgba(255,255,255,0.92);
    border-radius: 2px; padding: 0 3px;
    pointer-events: none; line-height: 1.3;
  }

  /* ===== Sidebar ===== */
  .sb-header {
    padding: 20px 20px 0;
    border-bottom: 1px solid #F0F0F0;
    padding-bottom: 16px;
  }
  .sb-title {
    font-size: 20px; font-weight: 800; color: #1A1A1A;
    letter-spacing: -0.5px; margin-bottom: 8px;
  }
  .sync-bar {
    font-size: 11px; color: #999;
    display: flex; align-items: center; gap: 6px;
  }
  .sync-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #4CAF50; display: inline-block;
  }
  .sync-dot.loading { background: #FF9800; animation: pulse 0.8s infinite; }
  .sync-dot.error { background: #E74C3C; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .gear-btn {
    background: none; border: none; color: #CCC;
    cursor: pointer; font-size: 13px; margin-left: 4px;
  }
  .gear-btn:hover { color: #999; }

  .sb-section { border-bottom: 1px solid #F0F0F0; }
  .sb-toggle {
    width: 100%; padding: 14px 20px;
    background: none; border: none;
    font-size: 14px; font-weight: 600; color: #1A1A1A;
    cursor: pointer; text-align: left;
    display: flex; justify-content: space-between; align-items: center;
    font-family: inherit;
  }
  .sb-toggle:hover { background: #FAFAFA; }
  .sb-toggle-icon { font-size: 12px; color: #AAA; transition: transform 0.2s; }
  .sb-toggle.open .sb-toggle-icon { transform: rotate(180deg); }
  .sb-panel {
    max-height: 0; overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .sb-panel.open { max-height: 800px; }
  .sb-panel-inner { padding: 0 20px 16px; }

  /* Legend */
  .legend-group { margin-bottom: 14px; }
  .legend-title {
    font-size: 11px; font-weight: 700; color: #999;
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .legend-item { font-size: 13px; color: #555; line-height: 1.8; }
  .legend-key { font-weight: 700; color: #1A1A1A; margin-right: 6px; }
  .legend-dot-sample {
    display: inline-flex; align-items: center; gap: 8px;
    margin-bottom: 4px; font-size: 12px; color: #555;
  }
  .sample-dot {
    width: 16px; height: 16px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 700; color: #FFF; background: #1A1A1A;
  }
  .sample-red { font-size: 8px; font-weight: 800; color: #E74C3C; }
  .sample-blue { font-size: 8px; font-weight: 700; color: #2196F3; }

  /* Form */
  .form-label {
    font-size: 11px; font-weight: 600; color: #999;
    margin-bottom: 4px; display: block;
  }
  .form-input, .form-select {
    width: 100%; padding: 9px 10px;
    border: 1.5px solid #E0E0E0; border-radius: 8px;
    font-size: 13px; outline: none;
    background: #FAFAFA; color: #333; font-family: inherit;
    margin-bottom: 10px;
  }
  .form-input:focus, .form-select:focus { border-color: #1A1A1A; }
  .form-select { appearance: auto; }
  .form-row { display: flex; gap: 8px; }
  .form-row > div { flex: 1; }
  .form-hint { font-size: 11px; color: #BBB; margin-bottom: 10px; }
  .add-btn {
    width: 100%; padding: 10px; background: #E0E0E0; color: #FFF;
    border: none; border-radius: 8px; font-size: 13px; font-weight: 700;
    cursor: not-allowed; transition: all 0.2s; font-family: inherit;
  }
  .add-btn.ready { background: #1A1A1A; cursor: pointer; }
  .add-btn.ready:hover { background: #333; }

  /* Dropdown */
  .dd-wrap { position: relative; }
  .dropdown {
    position: absolute; top: 100%; left: 0; right: 0;
    background: #FFF; border: 1.5px solid #E0E0E0; border-radius: 8px;
    max-height: 160px; overflow-y: auto; z-index: 200;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1); margin-top: -8px; display: none;
  }
  .dropdown.show { display: block; }
  .dd-item {
    padding: 9px 12px; font-size: 12px; cursor: pointer;
    border-bottom: 1px solid #F5F5F5; color: #333;
  }
  .dd-item:hover { background: #F5F5F5; }
  .dd-empty { padding: 12px; font-size: 12px; color: #BBB; }

  /* Store list */
  .store-list { padding: 0 20px 16px; flex: 1; overflow-y: auto; }
  .store-list-title {
    font-size: 11px; font-weight: 600; color: #999;
    margin-bottom: 8px; padding-top: 12px;
  }
  .store-scroll { display: flex; flex-direction: column; gap: 4px; }
  .store-row {
    background: #FAFAFA; border-radius: 6px;
    font-size: 12px;
    transition: background 0.15s;
  }
  .store-row-main {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 10px; cursor: pointer;
  }
  .store-row-main:hover { background: #F0F0F0; border-radius: 6px; }
  .store-row.editing { background: #EEF1F5; }
  .store-row.editing .store-row-main:hover { background: transparent; }
  .store-row-name { font-weight: 600; color: #333; }
  .store-row-vals { color: #AAA; font-size: 10px; }
  .store-row-del {
    background: none; border: none; color: #DDD;
    cursor: pointer; font-size: 14px; padding: 0 2px; line-height: 1; margin-left: 6px;
  }
  .store-row-del:hover { color: #E74C3C; }
  .store-row-edit {
    display: none;
    padding: 0 10px 10px;
    border-top: 1px solid #E0E0E0; margin-top: 2px;
  }
  .store-row.editing .store-row-edit { display: block; }
  .edit-field { margin-top: 8px; }
  .edit-field label {
    font-size: 10px; font-weight: 600; color: #999;
    display: block; margin-bottom: 3px;
  }
  .edit-field input, .edit-field select {
    width: 100%; padding: 6px 8px; font-size: 12px;
    border: 1px solid #DDD; border-radius: 5px;
    background: #FFF; font-family: inherit; color: #333;
    outline: none; box-sizing: border-box;
  }
  .edit-field input:focus, .edit-field select:focus { border-color: #1A1A1A; }
  .edit-row { display: flex; gap: 6px; }
  .edit-row > .edit-field { flex: 1; }
  .edit-actions { display: flex; gap: 6px; margin-top: 10px; }
  .edit-btn {
    flex: 1; padding: 7px; font-size: 12px; font-weight: 600;
    border-radius: 5px; cursor: pointer; font-family: inherit;
    border: 1px solid transparent;
  }
  .edit-btn-cancel { background: #FFF; color: #888; border-color: #DDD; }
  .edit-btn-cancel:hover { color: #333; border-color: #999; }
  .edit-btn-save { background: #1A1A1A; color: #FFF; }
  .edit-btn-save:hover { background: #333; }
  .edit-btn-save.saving { background: #999; cursor: wait; }

  /* Setup overlay */
  .setup-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 999; padding: 20px;
  }
  .setup-box {
    background: #FFF; border-radius: 16px; padding: 28px;
    max-width: 420px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }
  .setup-box h2 { font-size: 18px; font-weight: 800; margin-bottom: 8px; color: #1A1A1A; }
  .setup-box p { font-size: 13px; color: #666; line-height: 1.6; margin-bottom: 16px; }
  .setup-input {
    width: 100%; padding: 12px; border: 1.5px solid #DDD; border-radius: 8px;
    font-size: 13px; outline: none; margin-bottom: 12px; font-family: monospace; background: #FAFAFA;
  }
  .setup-btn {
    width: 100%; padding: 12px; background: #1A1A1A; color: #FFF;
    border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .setup-err { font-size: 12px; color: #E74C3C; margin-top: 8px; display: none; }

  /* ===== Mobile ===== */
  @media (max-width: 768px) {
    .main { flex-direction: column; overflow-y: auto; }
    .graph-section { padding: 12px; flex: none; }
    .graph-card {
      max-width: 100%; width: 100%;
      padding: 36px 28px 44px 44px;
    }
    .sidebar {
      width: 100%; height: auto; border-left: none;
      border-top: 1px solid #E8E8E8;
    }
  }
</style>
</head>
<body>

<!-- ===== Setup Overlay ===== -->
<div class="setup-overlay" id="setupOverlay" style="display:none">
  <div class="setup-box">
    <h2>Google Sheets 연결</h2>
    <p>Apps Script 웹 앱 URL을 붙여넣으세요.<br>
    <span style="color:#AAA;font-size:11px">https://script.google.com/macros/s/... 형태</span></p>
    <input class="setup-input" id="setupUrlInput" placeholder="웹 앱 URL 붙여넣기" spellcheck="false">
    <button class="setup-btn" id="setupSaveBtn">연결하기</button>
    <div class="setup-err" id="setupErr"></div>
  </div>
</div>

<!-- ===== Main Layout ===== -->
<div class="main">

  <!-- Graph -->
  <div class="graph-section">
    <div class="graph-card">
      <div class="graph-inner" id="graphArea">
        <svg viewBox="0 0 600 600" style="position:absolute;inset:0;width:100%;height:100%;overflow:visible" id="gridSvg">
          <g id="pointsContainer"></g>
        </svg>
      </div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sb-header">
      <div class="sb-title">자장면관 벤치마킹</div>
      <div class="sync-bar">
        <span class="sync-dot" id="syncDot"></span>
        <span id="syncText">연결 대기</span>
        <button class="gear-btn" id="resetUrlBtn" title="URL 재설정">⚙</button>
      </div>
    </div>

    <!-- Legend -->
    <div class="sb-section">
      <button class="sb-toggle" id="legendToggle">
        범례 <span class="sb-toggle-icon">▼</span>
      </button>
      <div class="sb-panel" id="legendPanel">
        <div class="sb-panel-inner">

          <div class="legend-group">
            <div class="legend-title">점 읽는 법</div>
            <div class="legend-dot-sample">
              <span class="sample-red">3</span>
              <span class="sample-blue">AC</span>
            </div>
            <div class="legend-dot-sample" style="margin-left:4px">
              <span class="sample-dot">4</span>
            </div>
            <div class="legend-dot-sample" style="font-size:11px;color:#888;margin-top:2px">
              매장명
            </div>
            <div style="font-size:11px;color:#AAA;margin-top:6px;line-height:1.6">
              <span class="sample-red" style="margin-right:2px">좌상</span> 감칠맛 직관성 &nbsp;
              <span class="sample-blue" style="margin-right:2px">우상</span> 향의 유형<br>
              <strong style="color:#555">원 안</strong> 점도 &nbsp;
              <strong style="color:#555">하단</strong> 매장명
            </div>
          </div>

          <div class="legend-group">
            <div class="legend-title">향의 유형</div>
            <div class="legend-item"><span class="legend-key">A</span>춘장향</div>
            <div class="legend-item"><span class="legend-key">B</span>농축 육향</div>
            <div class="legend-item"><span class="legend-key">C</span>양파 캐러멜라이즈 향</div>
            <div class="legend-item"><span class="legend-key">D</span>불향</div>
            <div style="font-size:11px;color:#AAA;margin-top:4px">대문자=강 / 소문자=약</div>
          </div>

          <div class="legend-group">
            <div class="legend-title">감칠맛의 직관성</div>
            <div class="legend-item"><span class="legend-key">1</span>매우 작음</div>
            <div class="legend-item"><span class="legend-key">2</span>작음</div>
            <div class="legend-item"><span class="legend-key">3</span>보통</div>
            <div class="legend-item"><span class="legend-key">4</span>큼</div>
            <div class="legend-item"><span class="legend-key">5</span>매우 큼</div>
          </div>

        </div>
      </div>
    </div>

    <!-- Add Store -->
    <div class="sb-section">
      <button class="sb-toggle" id="addToggle">
        가게 추가 <span class="sb-toggle-icon">▼</span>
      </button>
      <div class="sb-panel" id="addPanel">
        <div class="sb-panel-inner">

          <div class="dd-wrap">
            <label class="form-label">매장명</label>
            <input class="form-input" id="storeInput" type="text" placeholder="검색 또는 직접 입력" autocomplete="off">
            <div class="dropdown" id="storeDropdown"></div>
          </div>

          <div class="form-row">
            <div>
              <label class="form-label">감칠맛 직관성</label>
              <select class="form-select" id="inputIntuition">
                <option value="">선택</option>
                <option value="1">1</option><option value="1.5">1.5</option>
                <option value="2">2</option><option value="2.5">2.5</option>
                <option value="3">3</option><option value="3.5">3.5</option>
                <option value="4">4</option><option value="4.5">4.5</option>
                <option value="5">5</option>
              </select>
            </div>
            <div>
              <label class="form-label">향의 유형</label>
              <input class="form-input" id="inputAroma" type="text" placeholder="예: AC, b" style="margin-bottom:10px">
            </div>
          </div>

          <div>
            <label class="form-label">점도</label>
            <select class="form-select" id="inputViscosity">
              <option value="">선택</option>
              <option value="1">1</option><option value="1.5">1.5</option>
              <option value="2">2</option><option value="2.5">2.5</option>
              <option value="3">3</option><option value="3.5">3.5</option>
              <option value="4">4</option><option value="4.5">4.5</option>
              <option value="5">5</option>
            </select>
          </div>

          <div class="form-hint">추가 후 점을 드래그하여 위치를 지정하세요</div>
          <button class="add-btn" id="addStoreBtn">그래프에 추가</button>

        </div>
      </div>
    </div>

    <!-- Registered Stores -->
    <div class="store-list" id="storeListWrap"></div>

  </div>
</div>

<script>
// ====================================================
// CONFIG
// ====================================================
const STORES_BASE = [
  "영화루","효동각","이품","맛이차이나","강동원","태화루","안동장","송죽장",
  "동순각","보련각","개화","미미본관","중화요리팔공","동해반점","동흥관","외래향",
  "동해루","신성각","정","현래장","영화장","홍릉각","홍콩중화요리","옛날중국집",
  "롯데호텔도림","북경","화승원","금석궁","대관원","신승반점 여의도점","미르차이9",
  "호화반점","가담","일일향","홍명","공리","시추안하우스삼성점","행화촌","향원",
  "블랙데이","산곡동덕화원","띠디","루원","촉석루","대성반점","중화일상","보보식당",
  "초류향","대박각","중화요리하선생","황금장 중화요리","덕성각","서교동 진향",
  "마마수제만두","진아춘","일품","미광","신승반점 본점","만다복","연정","진호각","중화루"
];
const GRID = 5;
let points = [];
let allStoreNames = [...STORES_BASE];
let draggingId = null;
let selectedStore = "";
const DEFAULT_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxh7v3Z77mw7MGXf9RHKV2JbvK9xJk5XCsxcqbktYnNSJXfEzppu5LRg-nNCyB2GmU1/exec";
let SCRIPT_URL = "";

// ====================================================
// SYNC
// ====================================================
function setSyncStatus(s, t) {
  document.getElementById("syncDot").className = "sync-dot" + (s === "loading" ? " loading" : s === "error" ? " error" : "");
  document.getElementById("syncText").textContent = t;
}

async function apiGet() {
  if (!SCRIPT_URL) return null;
  setSyncStatus("loading", "동기화 중...");
  try {
    const r = await fetch(SCRIPT_URL);
    const j = await r.json();
    if (j.success) { setSyncStatus("ok", "연결됨 · " + j.data.length + "개"); return j.data; }
    throw new Error(j.error);
  } catch (e) { setSyncStatus("error", "동기화 실패"); console.error(e); return null; }
}

async function apiPost(body) {
  if (!SCRIPT_URL) return null;
  setSyncStatus("loading", "저장 중...");
  try {
    const r = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(body) });
    const j = await r.json();
    if (j.success) { setSyncStatus("ok", "연결됨 · " + points.length + "개"); return j; }
    throw new Error(j.error);
  } catch (e) { setSyncStatus("error", "저장 실패"); console.error(e); return null; }
}

// ====================================================
// SETUP
// ====================================================
function checkSetup() {
  SCRIPT_URL = localStorage.getItem("jjajang-script-url") || DEFAULT_SCRIPT_URL;
  if (!SCRIPT_URL) { document.getElementById("setupOverlay").style.display = "flex"; return false; }
  document.getElementById("setupOverlay").style.display = "none";
  return true;
}

document.getElementById("setupSaveBtn").addEventListener("click", async () => {
  const url = document.getElementById("setupUrlInput").value.trim();
  const err = document.getElementById("setupErr");
  if (!url.startsWith("https://script.google.com/")) {
    err.textContent = "올바른 Apps Script URL을 입력하세요"; err.style.display = "block"; return;
  }
  err.style.display = "none";
  localStorage.setItem("jjajang-script-url", url);
  SCRIPT_URL = url;
  document.getElementById("setupOverlay").style.display = "none";
  await loadData();
});

document.getElementById("resetUrlBtn").addEventListener("click", () => {
  document.getElementById("setupUrlInput").value = SCRIPT_URL;
  document.getElementById("setupOverlay").style.display = "flex";
});

// ====================================================
// LOAD DATA
// ====================================================
async function loadData() {
  const data = await apiGet();
  if (!data) return;
  points = data.map(d => ({
    _row: d._row,
    N: d["N"],
    name: String(d["매장명"] || ""),
    x: parseFloat(d["감칠맛의 크기"]) || 0,
    y: parseFloat(d["A~D 향의 강도"] ?? d["향의 강도"]) || 0,
    intuition: d["감칠맛의 직관성"],
    aromaType: String(d["향의 유형"] || ""),
    viscosity: d["점도"],
  }));
  // Update store names list
  const fromSheet = points.map(p => p.name).filter(n => n);
  allStoreNames = [...new Set([...STORES_BASE, ...fromSheet])].sort();
  renderPoints();
}

// ====================================================
// GRID
// ====================================================
// 좌표 변환 상수
const PLOT = { x0:60, y0:20, x1:580, y1:540 }; // 플롯 영역 (SVG 좌표)
const PLOT_W = PLOT.x1 - PLOT.x0; // 520
const PLOT_H = PLOT.y1 - PLOT.y0; // 520
function toSvgX(v) { return PLOT.x0 + (v / 5) * PLOT_W; }
function toSvgY(v) { return PLOT.y1 - (v / 5) * PLOT_H; }
function fromSvgX(sx) { return ((sx - PLOT.x0) / PLOT_W) * 5; }
function fromSvgY(sy) { return ((PLOT.y1 - sy) / PLOT_H) * 5; }

function drawGrid() {
  const svg = document.getElementById("gridSvg");
  Array.from(svg.children).forEach(el => { if (el.id !== "pointsContainer") el.remove(); });
  const ns = "http://www.w3.org/2000/svg";
  const pc = svg.querySelector("#pointsContainer");

  function add(tag, attrs, text) {
    const el = document.createElementNS(ns, tag);
    Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
    if (text != null) el.textContent = text;
    svg.insertBefore(el, pc);
    return el;
  }

  // 그리드선 & 눈금
  for (let i = 1; i <= 5; i++) {
    const sx = toSvgX(i), sy = toSvgY(i);
    // 세로선
    add("line", {x1:sx, y1:PLOT.y0, x2:sx, y2:PLOT.y1, stroke:"#E8E8E8", "stroke-width":1, "stroke-dasharray":"5 5"});
    // 가로선
    add("line", {x1:PLOT.x0, y1:sy, x2:PLOT.x1, y2:sy, stroke:"#E8E8E8", "stroke-width":1, "stroke-dasharray":"5 5"});
    // X축 눈금
    add("text", {x:sx, y:PLOT.y1+18, "text-anchor":"middle", "font-size":13, "font-weight":500, fill:"#BBB"}, i);
    // Y축 눈금
    add("text", {x:PLOT.x0-10, y:sy+5, "text-anchor":"end", "font-size":13, "font-weight":500, fill:"#BBB"}, i);
  }

  // X축, Y축 선
  add("line", {x1:PLOT.x0, y1:PLOT.y1, x2:PLOT.x1+14, y2:PLOT.y1, stroke:"#1A1A1A", "stroke-width":2});
  add("line", {x1:PLOT.x0, y1:PLOT.y1+8, x2:PLOT.x0, y2:PLOT.y0-8, stroke:"#1A1A1A", "stroke-width":2});
  // 화살표
  add("polygon", {points:`${PLOT.x1+14},${PLOT.y1} ${PLOT.x1+6},${PLOT.y1-5} ${PLOT.x1+6},${PLOT.y1+5}`, fill:"#1A1A1A"});
  add("polygon", {points:`${PLOT.x0},${PLOT.y0-8} ${PLOT.x0-5},${PLOT.y0} ${PLOT.x0+5},${PLOT.y0}`, fill:"#1A1A1A"});

  // 축 레이블
  add("text", {x:(PLOT.x0+PLOT.x1)/2, y:PLOT.y1+40, "text-anchor":"middle", "font-size":12, "font-weight":600, fill:"#999"}, "감칠맛의 크기");
  const yLabel = document.createElementNS(ns, "text");
  yLabel.setAttribute("x", PLOT.x0-38);
  yLabel.setAttribute("y", (PLOT.y0+PLOT.y1)/2);
  yLabel.setAttribute("text-anchor", "middle");
  yLabel.setAttribute("font-size", "12");
  yLabel.setAttribute("font-weight", "600");
  yLabel.setAttribute("fill", "#999");
  yLabel.setAttribute("transform", `rotate(-90, ${PLOT.x0-38}, ${(PLOT.y0+PLOT.y1)/2})`);
  yLabel.textContent = "향의 강도";
  svg.insertBefore(yLabel, pc);
}

// ====================================================
// RENDER POINTS
// ====================================================
function getJitteredPositions(pts) {
  // 같은 (x, y) 좌표를 가진 점들을 작은 반경의 원형으로 분산
  // 점 위치는 원래 좌표에 최대한 가깝게 유지 (최대 ~0.2 그리드)
  // 라벨은 점의 방위에 따라 바깥쪽으로 뻗어나가서 서로 겹치지 않게
  // 버킷 정밀도 0.01 — 저장된 좌표가 완전히 동일한 경우에만 분산
  const result = {};
  const groups = {};
  pts.forEach(pt => {
    const key = `${(pt.x ?? 0).toFixed(2)}_${(pt.y ?? 0).toFixed(2)}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(pt);
  });

  const PX_PER_GRID = 520 / 5; // 104

  Object.values(groups).forEach(group => {
    const N = group.length;
    if (N === 1) {
      const pt = group[0];
      result[pt._row] = { x: pt.x, y: pt.y, labelDir: null };
      return;
    }

    // 타이트한 반경: 좌표 보존 우선
    // N이 커질수록 조금만 더 벌림 (최대 22px = 0.21 그리드)
    let R_svg;
    if (N === 2) R_svg = 14;
    else if (N === 3) R_svg = 15;
    else if (N === 4) R_svg = 17;
    else if (N <= 6) R_svg = 20;
    else R_svg = 22;

    const gridR = R_svg / PX_PER_GRID;

    group.forEach((pt, idx) => {
      // idx=0 을 위(12시)로, 시계방향 분포
      const angle = -Math.PI / 2 + (2 * Math.PI * idx) / N;
      result[pt._row] = {
        x: pt.x + gridR * Math.cos(angle),
        y: pt.y - gridR * Math.sin(angle),
        labelDir: angle,
      };
    });
  });
  return result;
}

function renderPoints() {
  const c = document.getElementById("pointsContainer");
  c.innerHTML = "";

  const jitter = getJitteredPositions(points);

  points.forEach(pt => {
    const pos = jitter[pt._row] || { x: pt.x, y: pt.y, labelDir: null };
    const sx = toSvgX(pos.x);
    const sy = toSvgY(pos.y);
    const labelDir = pos.labelDir;

    const viscStr = (pt.viscosity !== "" && pt.viscosity != null && pt.viscosity !== "-") ? String(pt.viscosity) : "";
    const intStr  = (pt.intuition !== "" && pt.intuition != null && pt.intuition !== "-") ? String(pt.intuition) : "";
    const aromaStr = (pt.aromaType && pt.aromaType !== "-") ? String(pt.aromaType) : "";

    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
    g.setAttribute("transform", `translate(${sx},${sy})`);
    g.dataset.row = pt._row;
    g.style.cursor = "grab";
    g.style.userSelect = "none";

    // 원 (타이트) — 테두리가 안쪽 숫자에 거의 닿음
    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    circle.setAttribute("r", "4");
    circle.setAttribute("fill", "#1A1A1A");
    circle.setAttribute("stroke", "#fff");
    circle.setAttribute("stroke-width", "1");
    g.appendChild(circle);

    // 점도 (원 안)
    if (viscStr) {
      const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
      t.setAttribute("text-anchor", "middle");
      t.setAttribute("dominant-baseline", "central");
      t.setAttribute("fill", "#fff");
      t.setAttribute("font-size", "8");
      t.setAttribute("font-weight", "700");
      t.setAttribute("font-family", "inherit");
      t.textContent = viscStr;
      g.appendChild(t);
    }

    // 감칠맛 직관성 (왼쪽 위, 빨강) — 원에 바짝 붙음
    if (intStr) {
      const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
      t.setAttribute("x", "-5");
      t.setAttribute("y", "-6");
      t.setAttribute("text-anchor", "end");
      t.setAttribute("fill", "#E74C3C");
      t.setAttribute("font-size", "8");
      t.setAttribute("font-weight", "800");
      t.setAttribute("font-family", "inherit");
      t.textContent = intStr;
      g.appendChild(t);
    }

    // 향의 유형 (오른쪽 위, 파랑) — 원에 바짝 붙음
    if (aromaStr) {
      const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
      t.setAttribute("x", "5");
      t.setAttribute("y", "-6");
      t.setAttribute("text-anchor", "start");
      t.setAttribute("fill", "#2196F3");
      t.setAttribute("font-size", "8");
      t.setAttribute("font-weight", "700");
      t.setAttribute("font-family", "inherit");
      t.textContent = aromaStr;
      g.appendChild(t);
    }

    // 매장명 — 방향 인지형: 클러스터 내 점의 방위에 따라 라벨이 바깥으로 뻗음
    const isMemo = /^(불쾌|된장)/.test(pt.name || "");
    const nameText = document.createElementNS("http://www.w3.org/2000/svg", "text");
    nameText.setAttribute("fill", isMemo ? "#888" : "#333");
    nameText.setAttribute("font-size", isMemo ? "7" : "8");
    nameText.setAttribute("font-weight", isMemo ? "500" : "600");
    nameText.setAttribute("font-family", "inherit");
    nameText.textContent = pt.name;

    if (labelDir === null) {
      // 단독 점: 기본 아래
      nameText.setAttribute("x", "0");
      nameText.setAttribute("y", "14");
      nameText.setAttribute("text-anchor", "middle");
    } else {
      // 각도 정규화 (-180, 180]
      let deg = labelDir * 180 / Math.PI;
      deg = deg - 360 * Math.floor((deg + 180) / 360);
      if (deg > -120 && deg <= -60) {
        // 위
        nameText.setAttribute("x", "0");
        nameText.setAttribute("y", "-14");
        nameText.setAttribute("text-anchor", "middle");
      } else if (deg > -60 && deg <= 60) {
        // 오른쪽
        nameText.setAttribute("x", "7");
        nameText.setAttribute("y", "0");
        nameText.setAttribute("text-anchor", "start");
        nameText.setAttribute("dominant-baseline", "central");
      } else if (deg > 60 && deg <= 120) {
        // 아래
        nameText.setAttribute("x", "0");
        nameText.setAttribute("y", "14");
        nameText.setAttribute("text-anchor", "middle");
      } else {
        // 왼쪽
        nameText.setAttribute("x", "-7");
        nameText.setAttribute("y", "0");
        nameText.setAttribute("text-anchor", "end");
        nameText.setAttribute("dominant-baseline", "central");
      }
    }
    g.appendChild(nameText);

    g.addEventListener("mousedown", e => startDrag(pt._row, e));
    g.addEventListener("touchstart", e => startDrag(pt._row, e), { passive: false });
    c.appendChild(g);
  });
  renderStoreList();
}

// ====================================================
// DRAG
// ====================================================
function startDrag(row, e) {
  e.preventDefault();
  draggingId = row;
  document.body.style.userSelect = "none";
  const el = document.querySelector(`#pointsContainer g[data-row="${row}"]`);
  if (el) {
    el.querySelector("circle").setAttribute("fill", "#E74C3C");
    el.style.cursor = "grabbing";
  }
}

function onMove(e) {
  if (draggingId === null) return;
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  const rect = document.getElementById("graphArea").getBoundingClientRect();

  // graphArea 픽셀 → SVG 좌표 (viewBox 0 0 600 600)
  const svgX = ((cx - rect.left) / rect.width) * 600;
  const svgY = ((cy - rect.top) / rect.height) * 600;
  let x = Math.min(Math.max(fromSvgX(svgX), 0), 5);
  let y = Math.min(Math.max(fromSvgY(svgY), 0), 5);

  const pt = points.find(p => p._row === draggingId);
  if (pt) {
    pt.x = x; pt.y = y;
    const el = document.querySelector(`#pointsContainer g[data-row="${draggingId}"]`);
    if (el) el.setAttribute("transform", `translate(${toSvgX(x)},${toSvgY(y)})`);
  }
}

function onUp() {
  if (draggingId === null) return;
  const el = document.querySelector(`#pointsContainer g[data-row="${draggingId}"]`);
  if (el) {
    el.querySelector("circle").setAttribute("fill", "#1A1A1A");
    el.style.cursor = "grab";
  }
  const pt = points.find(p => p._row === draggingId);
  draggingId = null;
  document.body.style.userSelect = "";
  if (pt) {
    apiPost({ action: "update", row: pt._row, x: Math.round(pt.x * 100) / 100, y: Math.round(pt.y * 100) / 100 });
  }
  renderStoreList();
}

document.addEventListener("mousemove", onMove);
document.addEventListener("mouseup", onUp);
document.addEventListener("touchmove", onMove, { passive: false });
document.addEventListener("touchend", onUp);

// ====================================================
// TOGGLES
// ====================================================
function setupToggle(btnId, panelId) {
  const btn = document.getElementById(btnId);
  const panel = document.getElementById(panelId);
  btn.addEventListener("click", () => {
    btn.classList.toggle("open");
    panel.classList.toggle("open");
  });
}
setupToggle("legendToggle", "legendPanel");
setupToggle("addToggle", "addPanel");

// ====================================================
// DROPDOWN
// ====================================================
const storeInput = document.getElementById("storeInput");
const storeDD = document.getElementById("storeDropdown");

function showDropdown(filter) {
  const f = filter.toLowerCase();
  const matches = allStoreNames.filter(s => s.toLowerCase().includes(f));
  if (!matches.length) {
    storeDD.innerHTML = '<div class="dd-empty">결과 없음 — 직접 입력 가능</div>';
  } else {
    storeDD.innerHTML = matches.map(s => `<div class="dd-item">${s}</div>`).join("");
    storeDD.querySelectorAll(".dd-item").forEach(el => {
      el.addEventListener("mousedown", (e) => {
        e.preventDefault();
        selectedStore = el.textContent;
        storeInput.value = selectedStore;
        storeDD.classList.remove("show");
        updateAddBtn();
      });
    });
  }
  storeDD.classList.add("show");
}

storeInput.addEventListener("focus", () => showDropdown(storeInput.value));
storeInput.addEventListener("input", () => {
  selectedStore = storeInput.value.trim();
  showDropdown(storeInput.value);
  updateAddBtn();
});
storeInput.addEventListener("blur", () => {
  setTimeout(() => storeDD.classList.remove("show"), 150);
  if (!selectedStore) selectedStore = storeInput.value.trim();
  updateAddBtn();
});

// ====================================================
// ADD
// ====================================================
const inputInt = document.getElementById("inputIntuition");
const inputAroma = document.getElementById("inputAroma");
const inputVisc = document.getElementById("inputViscosity");
const addBtn2 = document.getElementById("addStoreBtn");

function updateAddBtn() {
  const ok = (selectedStore || storeInput.value.trim());
  addBtn2.className = ok ? "add-btn ready" : "add-btn";
}
[inputInt, inputAroma, inputVisc].forEach(el => el.addEventListener("change", updateAddBtn));
storeInput.addEventListener("input", updateAddBtn);

addBtn2.addEventListener("click", async () => {
  const name = selectedStore || storeInput.value.trim();
  if (!name) return;

  const newPoint = {
    "매장명": name,
    "감칠맛의 크기": 2.5,
    "감칠맛의 직관성": inputInt.value ? parseFloat(inputInt.value) : "",
    "A~D 향의 강도": 2.5,
    "향의 유형": inputAroma.value.trim() || "-",
    "점도": inputVisc.value ? parseFloat(inputVisc.value) : "",
  };

  const localPt = {
    _row: -Date.now(), // 임시 row
    N: "",
    name: name,
    x: 2.5, y: 2.5,
    intuition: newPoint["감칠맛의 직관성"],
    aromaType: newPoint["향의 유형"],
    viscosity: newPoint["점도"],
  };
  points.push(localPt);
  renderPoints();

  const result = await apiPost({ action: "add", point: newPoint });
  if (result && result.row) {
    localPt._row = result.row;
    localPt.N = result.N;
  }

  // Add to store names if new
  if (!allStoreNames.includes(name)) {
    allStoreNames.push(name);
    allStoreNames.sort();
  }

  storeInput.value = "";
  selectedStore = "";
  inputInt.value = "";
  inputAroma.value = "";
  inputVisc.value = "";
  updateAddBtn();
});

// ====================================================
// STORE LIST
// ====================================================
function escapeHtml(s) {
  return String(s || "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function renderStoreList() {
  const wrap = document.getElementById("storeListWrap");
  if (!points.length) { wrap.innerHTML = ""; return; }

  const scaleOpts = ["", "1", "1.5", "2", "2.5", "3", "3.5", "4", "4.5", "5"];
  const optsHtml = (selected) => scaleOpts.map(v => {
    const s = String(selected == null ? "" : selected);
    return `<option value="${v}"${s === v ? " selected" : ""}>${v || "—"}</option>`;
  }).join("");

  let h = `<div class="store-list-title">등록된 가게 (${points.length})</div><div class="store-scroll">`;
  points.forEach(pt => {
    const vals = [];
    if (pt.x != null) vals.push("감" + (Math.round(pt.x*10)/10));
    if (pt.y != null) vals.push("향" + (Math.round(pt.y*10)/10));
    if (pt.intuition !== "" && pt.intuition != null) vals.push("직" + pt.intuition);
    if (pt.viscosity !== "" && pt.viscosity != null && pt.viscosity !== "-") vals.push("점" + pt.viscosity);
    const aromaVal = (pt.aromaType && pt.aromaType !== "-") ? pt.aromaType : "";

    h += `<div class="store-row" data-row="${pt._row}">
      <div class="store-row-main">
        <span class="store-row-name">${escapeHtml(pt.name)}</span>
        <div style="display:flex;align-items:center">
          <span class="store-row-vals">${vals.join(" · ")}</span>
          <button class="store-row-del" data-row="${pt._row}" title="삭제">✕</button>
        </div>
      </div>
      <div class="store-row-edit">
        <div class="edit-field">
          <label>매장명</label>
          <input class="edit-name" type="text" value="${escapeHtml(pt.name)}">
        </div>
        <div class="edit-row">
          <div class="edit-field">
            <label>직관성</label>
            <select class="edit-int">${optsHtml(pt.intuition)}</select>
          </div>
          <div class="edit-field">
            <label>향 유형</label>
            <input class="edit-aroma" type="text" value="${escapeHtml(aromaVal)}" placeholder="예: AC, b">
          </div>
          <div class="edit-field">
            <label>점도</label>
            <select class="edit-visc">${optsHtml(pt.viscosity)}</select>
          </div>
        </div>
        <div class="edit-actions">
          <button class="edit-btn edit-btn-cancel">취소</button>
          <button class="edit-btn edit-btn-save">저장</button>
        </div>
      </div>
    </div>`;
  });
  h += "</div>";
  wrap.innerHTML = h;

  // 삭제
  wrap.querySelectorAll(".store-row-del").forEach(btn => {
    btn.addEventListener("click", async (e) => {
      e.stopPropagation();
      const row = parseInt(btn.dataset.row);
      points = points.filter(p => p._row !== row);
      renderPoints();
      if (row > 0) await apiPost({ action: "delete", row });
    });
  });

  // 행 클릭 → 편집 토글
  wrap.querySelectorAll(".store-row-main").forEach(main => {
    main.addEventListener("click", (e) => {
      if (e.target.classList.contains("store-row-del")) return;
      const row = main.closest(".store-row");
      wrap.querySelectorAll(".store-row.editing").forEach(r => {
        if (r !== row) r.classList.remove("editing");
      });
      row.classList.toggle("editing");
    });
  });

  // 취소
  wrap.querySelectorAll(".edit-btn-cancel").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      btn.closest(".store-row").classList.remove("editing");
    });
  });

  // 저장
  wrap.querySelectorAll(".edit-btn-save").forEach(btn => {
    btn.addEventListener("click", async (e) => {
      e.stopPropagation();
      const rowEl = btn.closest(".store-row");
      const rowId = parseInt(rowEl.dataset.row);
      const pt = points.find(p => p._row === rowId);
      if (!pt) return;

      const newName = rowEl.querySelector(".edit-name").value.trim();
      const newIntRaw = rowEl.querySelector(".edit-int").value;
      const newAroma = rowEl.querySelector(".edit-aroma").value.trim();
      const newViscRaw = rowEl.querySelector(".edit-visc").value;

      const newInt = newIntRaw ? parseFloat(newIntRaw) : "";
      const newVisc = newViscRaw ? parseFloat(newViscRaw) : "";
      const aromaOut = newAroma || "-";

      // 로컬 즉시 반영
      pt.name = newName;
      pt.intuition = newInt;
      pt.aromaType = aromaOut;
      pt.viscosity = newVisc;

      rowEl.classList.remove("editing");
      renderPoints();
      renderStoreList();

      // 서버 전송 (시트 헤더명 기준). sync 상태 바에서 결과 확인 가능
      await apiPost({
        action: "update",
        row: rowId,
        "매장명": newName,
        "감칠맛의 직관성": newInt,
        "향의 유형": aromaOut,
        "점도": newVisc,
      });
    });
  });
}

// ====================================================
// INIT
// ====================================================
drawGrid();
if (checkSetup()) loadData();
